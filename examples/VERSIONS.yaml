# VERSIONS.yaml — Single Source of Truth for Component Versions
#
# THIS FILE IS A SAMPLE. The components, versions, and dates below
# are illustrative (the fictional TaskFlow project). Replace entirely
# with your project's actual components and pinned versions before
# committing to your repo. The SHAPE travels; the contents do not.
#
# WHY THIS EXISTS:
# AI agents' training data is outdated. This file prevents them from using
# deprecated APIs, wrong config syntax, or features that don't exist in
# the versions you actually use.
#
# RULES:
# - Update version + date + changelog when releasing changes
# - Update compatibility matrix when cross-component dependencies change
# - Commit with message: "release: <component> v<version>"
#
# VERSION BUMPS:
# - MAJOR: Breaking API/protocol changes
# - MINOR: New features (backwards compatible)
# - PATCH: Bug fixes

schema_version: "1.0.0"

components:
  web_frontend:
    name: "TaskFlow Web"
    description: "React SPA for task management"
    repository: "taskflow-web"
    version: "0.4.0"
    updated: "2025-03-15"
    owner: "Frontend Team"
    changelog:
      - version: "0.4.0"
        date: "2025-03-15"
        changes:
          - "Add real-time notifications via WebSocket"
          - "Migrate from React Router v5 to v6"
      - version: "0.3.0"
        date: "2025-02-20"
        changes:
          - "Add team workspace views"
          - "Integrate with OAuth2/OIDC provider"

  backend_api:
    name: "TaskFlow API"
    description: "Node.js REST API with PostgreSQL"
    repository: "taskflow-api"
    version: "0.5.0"
    updated: "2025-03-18"
    owner: "Backend Team"
    changelog:
      - version: "0.5.0"
        date: "2025-03-18"
        changes:
          - "Add WebSocket notification service"
          - "Implement rate limiting middleware"
      - version: "0.4.0"
        date: "2025-03-01"
        changes:
          - "Add multi-tenant RLS policies"
          - "Migrate to PostgreSQL 16"

  mobile_app:
    name: "TaskFlow Mobile"
    description: "React Native companion app"
    repository: "taskflow-mobile"
    version: "0.2.0"
    updated: "2025-03-10"
    owner: "Mobile Team"
    changelog:
      - version: "0.2.0"
        date: "2025-03-10"
        changes:
          - "Add push notification support"
          - "Offline task queue with sync"

  infrastructure:
    name: "TaskFlow Infra"
    description: "AWS CDK stacks for cloud infrastructure"
    repository: "taskflow-infra"
    version: "0.3.0"
    updated: "2025-03-12"
    owner: "Platform Team"
    changelog:
      - version: "0.3.0"
        date: "2025-03-12"
        changes:
          - "Add CloudFront CDN for static assets"
          - "Configure RDS Multi-AZ for production"

# Pinned dependency versions — agents MUST use these, not training data
dependencies:
  runtime:
    node: "20.11.1"
    typescript: "5.4.2"
    react: "18.2.0"
    react_router: "6.22.3"
    next: "14.1.3"
    express: "4.18.3"
    prisma: "5.11.0"
    react_native: "0.73.5"

  databases:
    postgresql: "16.2"
    redis: "7.2.4"

  infrastructure:
    docker: "25.0.4"
    aws_cdk: "2.133.0"
    terraform: "1.7.4"

  auth:
    keycloak: "24.0.1"

  testing:
    jest: "29.7.0"
    playwright: "1.42.1"
    cypress: "13.7.0"

# Which component versions work together
compatibility:
  - release: "platform-0.5.0"
    date: "2025-03-18"
    components:
      web_frontend: ">=0.4.0"
      backend_api: ">=0.5.0"
      mobile_app: ">=0.2.0"
      infrastructure: ">=0.3.0"
    notes: "WebSocket notifications require backend >=0.5.0 and web >=0.4.0"

  - release: "platform-0.4.0"
    date: "2025-03-01"
    components:
      web_frontend: ">=0.3.0"
      backend_api: ">=0.4.0"
      mobile_app: ">=0.1.0"
      infrastructure: ">=0.2.0"
    notes: "Multi-tenant RLS requires backend >=0.4.0"
